server:
  address: ":8080"

minio:
  endpoint: "localhost:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  bucket: "my-bucket"
  use_ssl: false
  region: "us-east-1"

users:
  - access_key: "user1key"
    secret_key: "user1secret"
    rules:
      - prefix: "photos/"
        verbs:
          - get
          - list
      - prefix: "uploads/user1/"
        verbs:
          - get
          - put
          - delete
          - list
  - access_key: "user2key"
    secret_key: "user2secret"
    rules:
      - prefix: ""
        verbs:
          - get
          - list
